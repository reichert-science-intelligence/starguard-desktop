# StarGuard Desktop Deploy — test always, deploy only on main push
name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check . --config pyproject.toml

      - name: Mypy type-check
        run: mypy hedis_gap_trail.py cloud_status_badge.py suppression_banner.py hitl_admin_view.py --config-file pyproject.toml

      - name: Pytest
        run: pytest tests/ -v --tb=short

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add hf https://rreichert:$HF_TOKEN@huggingface.co/spaces/rreichert/starguard-desktop || true
          git remote set-url hf https://rreichert:$HF_TOKEN@huggingface.co/spaces/rreichert/starguard-desktop
          git push hf main --force
