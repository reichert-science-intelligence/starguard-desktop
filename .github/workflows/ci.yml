# StarGuard Desktop CI — lint, type-check, pytest
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://github.com/open-policy-agent/opa/releases/download/v0.70.0/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Ruff lint
        run: ruff check . --config pyproject.toml

      - name: Mypy type-check
        run: mypy hedis_gap_trail.py cloud_status_badge.py suppression_banner.py hitl_admin_view.py --config-file pyproject.toml

      - name: Pytest
        run: PYTHONPATH=. pytest tests/ -v --tb=short
